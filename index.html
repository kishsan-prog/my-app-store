<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>App Store</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007aff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="https://picsum.photos/192">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <div class="nav-container">
            <div class="header-top">
                <h1>Apps</h1>
                <div class="header-btns">
                    <button id="installBtn" class="secondary-btn">Install</button>
                    <button id="openModal" class="primary-btn">Submit</button>
                </div>
            </div>
            <div class="search-wrapper">
                <input type="text" id="appSearch" placeholder="Search for apps, games, and more">
            </div>
        </div>
    </nav>

    <main id="app-grid">
        </main>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker Registered'))
                    .catch(err => console.log('Service Worker Failed', err));
            });
        }
    </script>

    <script src="script.js"></script>
</body>
</html>
